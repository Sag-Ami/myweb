<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #2980b9;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        section {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: white;
        }

        footer {
            text-align: center;
            background-color: #333;
            color: white;
            padding: 15px;
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Добро пожаловать!</h1>
    <p>Это мой первый HTML-сайт</p>
</header>

<nav>
    <a href="#about">О нас</a>
    <a href="#services">Услуги</a>
    <a href="#contact">Контакты</a>
</nav>

<section id="about">
    <h2>О нас</h2>
    <p>Мы создаем современные сайты и веб-приложения.</p>
</section>

<section id="services">
    <h2>Услуги</h2>
    <ul>
        <li>Создание сайтов</li>
        <li>Дизайн интерфейсов</li>
        <li>Поддержка проектов</li>
    </ul>
</section>

<section id="contact">
    <h2>Контакты</h2>
    <p>Email: example@mail.com</p>
    <a href="mailto:example@mail.com" class="button">Написать нам</a>
</section>

<footer>
    <p>© 2026 Мой сайт. Все права защищены.</p>
</footer>

</body>
</html>
